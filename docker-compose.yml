version: '3.8'
services:
  mongodb:
    container_name: mongodb_services
    image: mongo:latest
    environment:
       MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
       MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    volumes:
      - mongo_data:/data/db
    expose:
      - "27017"
    restart: unless-stopped
    healthcheck:
      test:  ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - bbms_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      -  ./.env
    expose:
      - "5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - bbms_network

  frontend-build:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
       - ./frontend/dist:/app/dist
    command: ["npm","run","build"]
    networks:
      - bbms_network


  nginx:
    container_name: nginx
    image: nginx:1.25.3-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist/:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend-build
    networks:
      - bbms_network
networks:
  bbms_network:
    driver: bridge
volumes:
  mongo_data:
